<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>N.B.Y. Stellar 3D Campus</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --glass: rgba(15, 23, 42, 0.85);
            --border: rgba(255, 255, 255, 0.15);
            --edge: 16px;
            --safe-bottom: calc(var(--edge) + env(safe-area-inset-bottom, 0px));
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            font-family: 'Kanit', sans-serif;
            touch-action: none; color: white;
            -webkit-tap-highlight-color: transparent;
        }

        #info-card {
            position: absolute; 
            bottom: calc(var(--safe-bottom) + 85px); 
            left: 50%; 
            transform: translateX(-50%) translateY(15px);
            background: var(--glass); 
            border: 1px solid var(--border);
            padding: 8px 18px; border-radius: 100px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 10px var(--accent-glow);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 99; opacity: 0; pointer-events: none;
            border-top: 2px solid var(--accent);
            font-size: 0.9rem;
            max-width: 80vw;
            text-align: center;
        }
        #info-card.active { transform: translateX(-50%) translateY(0); opacity: 1; }

        .zoom-controls {
            position: absolute; right: var(--edge); bottom: var(--safe-bottom);
            display: flex; flex-direction: column; gap: 10px; z-index: 101;
        }

        .nav-controls {
            position: absolute; left: var(--edge); bottom: var(--safe-bottom); z-index: 101;
        }

        .action-btn {
            width: 50px; height: 50px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 16px;
            color: white; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .action-btn:active { transform: scale(0.9); background: var(--accent); color: #000; }
        
        .nav-toggle { 
            background: var(--accent); color: #000; border: none; 
            width: 58px; height: 58px; border-radius: 20px; font-size: 22px; 
        }
        .nav-toggle.active { background: #ef4444; color: white; transform: rotate(45deg); }

        #nav-menu {
            position: absolute; 
            bottom: calc(var(--safe-bottom) + 75px); 
            left: var(--edge);
            right: var(--edge);
            max-width: 400px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 28px; padding: 20px;
            transform: translateY(30px) scale(0.95); opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 105; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #nav-menu.active { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

        .location-list {
            max-height: 40vh; overflow-y: auto; display: flex;
            flex-direction: column; gap: 8px; padding-right: 5px;
            -webkit-overflow-scrolling: touch;
        }
        
        .loc-item {
            padding: 12px 16px; background: rgba(255,255,255,0.05);
            border-radius: 14px; cursor: pointer; border: 1px solid transparent;
            transition: 0.2s; display: flex; align-items: center; gap: 12px;
            font-size: 0.95rem;
        }
        .loc-item:active { background: rgba(56, 189, 248, 0.2); border-color: var(--accent); }
        .loc-item i { color: var(--accent); font-size: 1rem; width: 24px; text-align: center; }

        .reset-container {
            margin-top: 15px; padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        .btn-reset-view {
            width: 100%; padding: 14px;
            background: rgba(239, 68, 68, 0.1); border: 1px dashed #ef4444;
            border-radius: 16px; color: #ef4444; font-family: 'Kanit', sans-serif;
            font-weight: 600; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }
    </style>
</head>
<body>
    <script src="All/กำลังโหลด.js"></script>
    <script src="All/ย้อนกลับ.js"></script>
    <script src="All/พื้นหลัง.js"></script>
    
    <div id="info-card">
        <span id="target-name">N.B.Y. Campus</span>
    </div>

    <div class="nav-controls">
        <button id="btn-toggle" class="action-btn nav-toggle" onclick="toggleMenu()">
            <i class="fas fa-map-marked-alt"></i>
        </button>
    </div>

    <div class="zoom-controls">
        <button id="btn-in" class="action-btn"><i class="fas fa-plus"></i></button>
        <button id="btn-out" class="action-btn"><i class="fas fa-minus"></i></button>
    </div>

    <div id="nav-menu">
        <div class="location-list">
            <div class="loc-item" onclick="flyTo('ระหว่างอาคาร1กับ2')"><i class="fas fa-building"></i> ม.1/1</div>
            <div class="loc-item" onclick="flyTo('ข้างสนามฟุตบอล')"><i class="fas fa-building"></i> ม.1/2</div>
            <div class="loc-item" onclick="flyTo('ถนนหน้าโรงเรียน')"><i class="fas fa-building"></i> ม.2/1</div>
            <div class="loc-item" onclick="flyTo('รอบโรงอาหารและห้องน้ำ')"><i class="fas fa-building"></i> ม.2/2</div>
            <div class="loc-item" onclick="flyTo('รอบอาคาร3')"><i class="fas fa-building"></i> ม.3/1</div>
            <div class="loc-item" onclick="flyTo('ถนนข้างโรงอาหาร')"><i class="fas fa-building"></i> ม.3/2</div>
            <div class="loc-item" onclick="flyTo('ถนนหน้าอาาร1')"><i class="fas fa-building"></i> ม.4/1</div>
            <div class="loc-item" onclick="flyTo('บนช็อป')"><i class="fas fa-building"></i> ม.4/2</div>
            <div class="loc-item" onclick="flyTo('ข้างหอประชุม')"><i class="fas fa-building"></i> ม.5/1</div>
            <div class="loc-item" onclick="flyTo('สนามฟุตบอล')"><i class="fas fa-building"></i> ม.5/2</div>
            <div class="loc-item" onclick="flyTo('สนามและหน้าเสาธง')"><i class="fas fa-building"></i> ม.6/1</div>
            <div class="loc-item" onclick="flyTo('ถนนหน้าโรงอาหาร')"><i class="fas fa-building"></i> ม.6/2</div>
        </div>

        <div class="reset-container">
            <button class="btn-reset-view" onclick="resetHighlight(true)">
                <i class="fas fa-compress-arrows-alt"></i> คืนค่ามุมมองทั้งหมด
            </button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, controls, model;
        let zoomDir = 0, currentZoomSpeed = 0;
        let lastHighlightedObject = null;
        let originalMaterials = new Map();
        let initialCameraPos = new THREE.Vector3();
        let initialTargetPos = new THREE.Vector3();
        let pulseTween = null; // เก็บ Animation กะพริบ

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 1.2); scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1.5); sun.position.set(100, 300, 100); scene.add(sun);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.enableZoom = true;
            
            // ตั้งค่าการหมุนอัตโนมัติ (ปิดไว้ก่อนจนกว่าจะกดเลือกตำแหน่ง)
            controls.autoRotate = false;
            controls.autoRotateSpeed = 0.5; // หมุนช้าๆ

            controls.maxPolarAngle = Math.PI / 2.1;
            controls.minDistance = 50;
            controls.maxDistance = 1500;

            const loader = new GLTFLoader();
            loader.load('school_map.glb', (gltf) => {
                model = gltf.scene;
                scene.add(model);
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                initialTargetPos.copy(center);
                initialCameraPos.set(center.x + 500, center.y + 500, center.z + 500);
                controls.target.copy(initialTargetPos);
                camera.position.copy(initialCameraPos);
                animate();
            });

            setupZoomButtons();
            window.addEventListener('resize', onWindowResize);
        }

        window.flyTo = (objectName) => {
            if (!model) return;
            const targetObj = model.getObjectByName(objectName);
            if (!targetObj) return;

            resetHighlight(false);
            lastHighlightedObject = targetObj;

            const box = new THREE.Box3().setFromObject(targetObj);
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = box.getSize(new THREE.Vector3()).length();

            // สร้างวัสดุไฮไลท์และใส่เอฟเฟกต์กะพริบ
            targetObj.traverse((child) => {
                if (child.isMesh) {
                    originalMaterials.set(child, child.material);
                    const highlightMat = new THREE.MeshStandardMaterial({ 
                        color: 0x38bdf8, 
                        emissive: 0x38bdf8, 
                        emissiveIntensity: 0.3, // เริ่มต้นกะพริบ
                        transparent: true, 
                        opacity: 0.8 
                    });
                    child.material = highlightMat;

                    // ทำ Effect กะพริบช้าๆ (Pulse)
                    pulseTween = gsap.to(highlightMat, {
                        emissiveIntensity: 1.2,
                        duration: 1.5,
                        repeat: -1,
                        yoyo: true,
                        ease: "sine.inOut"
                    });
                }
            });

            document.getElementById('target-name').innerText = "📍 " + objectName;
            document.getElementById('info-card').classList.add('active');

            const distance = Math.max(size * 1.1, 80); 

            // เลื่อนกล้องและเป้าหมาย
            gsap.to(camera.position, {
                x: center.x + distance, y: center.y + distance, z: center.z + distance,
                duration: 1.8, ease: "power3.inOut", 
                onUpdate: () => controls.update(),
                onComplete: () => {
                    controls.autoRotate = true; // เริ่มหมุนช้าๆ เมื่อซูมเสร็จ
                }
            });

            gsap.to(controls.target, {
                x: center.x, y: center.y, z: center.z,
                duration: 1.8, ease: "power3.inOut"
            });

            if (window.innerWidth < 768) toggleMenu();
        };

        window.toggleMenu = () => {
            document.getElementById('nav-menu').classList.toggle('active');
            document.getElementById('btn-toggle').classList.toggle('active');
        };

        window.resetHighlight = (moveCamera = true) => {
            // หยุดการกะพริบ
            if (pulseTween) { pulseTween.kill(); pulseTween = null; }
            
            if (lastHighlightedObject) {
                lastHighlightedObject.traverse(c => { 
                    if(c.isMesh && originalMaterials.has(c)) c.material = originalMaterials.get(c); 
                });
                originalMaterials.clear(); 
                lastHighlightedObject = null;
                document.getElementById('info-card').classList.remove('active');
            }

            controls.autoRotate = false; // หยุดการหมุน

            if (moveCamera) {
                gsap.to(controls.target, { x: initialTargetPos.x, y: initialTargetPos.y, z: initialTargetPos.z, duration: 1.2, ease: "expo.out" });
                gsap.to(camera.position, { x: initialCameraPos.x, y: initialCameraPos.y, z: initialCameraPos.z, duration: 1.2, ease: "expo.out", onUpdate: () => controls.update() });
                if(document.getElementById('nav-menu').classList.contains('active')) toggleMenu();
            }
        };

        function setupZoomButtons() {
            const setup = (id, dir) => {
                const btn = document.getElementById(id);
                btn.onpointerdown = (e) => { btn.setPointerCapture(e.pointerId); zoomDir = dir; controls.autoRotate = false; };
                btn.onpointerup = () => zoomDir = 0;
            };
            setup("btn-in", -1); setup("btn-out", 1);
        }

        function updateButtonZoom() {
            currentZoomSpeed += (zoomDir * 12.0 - currentZoomSpeed) * 0.15;
            if (Math.abs(currentZoomSpeed) > 0.01) {
                const dir = new THREE.Vector3(); 
                camera.getWorldDirection(dir);
                camera.position.addScaledVector(dir, -currentZoomSpeed);
                controls.update();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateButtonZoom();
            controls.update(); 
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
