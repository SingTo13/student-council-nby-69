<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>แจ้งปัญหา | สภานักเรียน NBY</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════
           TOKENS
        ═══════════════════════════════ */
        :root {
            --accent:        #38bdf8;
            --accent-dim:    rgba(56,189,248,0.10);
            --accent-glow:   rgba(56,189,248,0.22);
            --accent-border: rgba(56,189,248,0.30);

            /* frosted glass palette */
            --frost:         rgba(255,255,255,0.07);
            --frost-hover:   rgba(255,255,255,0.11);
            --frost-input:   rgba(255,255,255,0.06);
            --frost-input-f: rgba(255,255,255,0.10);
            --border:        rgba(255,255,255,0.12);
            --border-s:      rgba(255,255,255,0.06);
            --shine:         rgba(255,255,255,0.55);

            --text:          #f1f5f9;
            --text-dim:      rgba(148,163,184,0.75);
            --text-dimmer:   rgba(148,163,184,0.40);

            --danger:        #f87171;
            --warning:       #fbbf24;
            --success:       #34d399;
            --grey:          #64748b;

            --r-xl: 26px;
            --r-lg: 18px;
            --r-md: 12px;
            --r-sm: 8px;
            --ease: cubic-bezier(0.23,1,0.32,1);
            --spring: cubic-bezier(0.34,1.56,0.64,1);
        }

        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

        body {
            font-family:'Sarabun',sans-serif;
            color:var(--text);
            background:#020817; /* fallback — พื้นหลัง.js ทับได้ */
            overflow-x:hidden; min-height:100vh;
        }

        /* grain overlay */
        body::after {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity:.5;
        }

        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:rgba(56,189,248,.2); border-radius:4px; }

        /* ═══════════════════════════════
           LAYOUT
        ═══════════════════════════════ */
        .page {
            position:relative; z-index:1;
            max-width:600px; margin:0 auto;
            padding: calc(env(safe-area-inset-top,0px) + 68px) 16px
                     calc(env(safe-area-inset-bottom,0px) + 48px);
        }

        /* ═══════════════════════════════
           HERO
        ═══════════════════════════════ */
        .hero {
            text-align:center; margin-bottom:32px;
            animation:fadeUp .7s var(--spring) both;
        }
        .hero-chip {
            display:inline-flex; align-items:center; gap:7px;
            background:var(--accent-dim); border:1px solid var(--accent-border);
            border-radius:999px; padding:4px 14px 4px 10px;
            font-family:'Kanit'; font-weight:500;
            font-size:.7rem; letter-spacing:.1em; color:var(--accent);
            margin-bottom:16px;
        }
        .hero-chip .pulse {
            width:7px; height:7px; border-radius:50%; background:var(--accent);
            animation:pulse 1.6s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100%{ box-shadow:0 0 0 0 var(--accent-glow); }
            50%    { box-shadow:0 0 0 5px rgba(56,189,248,0); }
        }
        .hero h1 {
            font-family:'Kanit'; font-weight:700;
            font-size:clamp(1.9rem,5.5vw,2.6rem); line-height:1.1;
            background:linear-gradient(150deg,#fff 40%,var(--accent) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .hero-sub { margin-top:9px; font-size:.82rem; color:var(--text-dim); letter-spacing:.05em; }

        /* ═══════════════════════════════
           FROSTED CARD
        ═══════════════════════════════ */
        .card {
            background:var(--frost);
            backdrop-filter:blur(32px); -webkit-backdrop-filter:blur(32px);
            border:1px solid var(--border);
            border-radius:var(--r-xl);
            padding:26px 22px;
            position:relative; overflow:hidden;
            box-shadow:
                0 4px 24px rgba(0,0,0,0.25),
                inset 0 1px 0 rgba(255,255,255,0.12),
                inset 0 -1px 0 rgba(0,0,0,0.08);
            margin-bottom:18px;
            animation:fadeUp .65s var(--spring) both;
        }
        /* top-edge shine */
        .card::before {
            content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
            background:linear-gradient(90deg,transparent,var(--shine),transparent);
            opacity:.18;
        }

        .card-heading {
            display:flex; align-items:center; gap:10px;
            font-family:'Kanit'; font-weight:600; font-size:.88rem;
            color:rgba(255,255,255,.85); margin-bottom:20px;
        }
        .card-heading .ch-icon {
            width:32px; height:32px; border-radius:var(--r-sm);
            background:var(--accent-dim); border:1px solid var(--accent-border);
            display:flex; align-items:center; justify-content:center;
            font-size:.8rem; color:var(--accent); flex-shrink:0;
        }

        /* ═══════════════════════════════
           INPUTS
        ═══════════════════════════════ */
        .field { margin-bottom:16px; }
        .field-label {
            font-family:'Kanit'; font-weight:600; font-size:.78rem;
            color:rgba(255,255,255,.55); margin-bottom:7px;
            display:flex; align-items:center; gap:6px; letter-spacing:.03em;
        }
        .field-label i { color:var(--accent); font-size:.72rem; }

        textarea, input[type="url"] {
            width:100%;
            background:var(--frost-input);
            border:1px solid var(--border);
            border-radius:var(--r-lg); color:var(--text);
            font-family:'Sarabun'; font-size:.93rem; line-height:1.6;
            padding:13px 15px; transition:.25s var(--ease);
            outline:none; appearance:none;
            /* frosted */
            backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
        }
        textarea { resize:none; min-height:108px; }
        textarea::placeholder, input::placeholder { color:var(--text-dimmer); }
        textarea:focus, input:focus {
            border-color:var(--accent-border);
            background:var(--frost-input-f);
            box-shadow:0 0 0 3px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.06);
        }

        .char-row {
            display:flex; justify-content:flex-end;
            margin-top:5px; font-size:.68rem; color:var(--text-dimmer);
            transition:.2s;
        }
        .char-row.warn { color:var(--warning); }

        /* ═══════════════════════════════
           SUBMIT BUTTON  — สีฟ้า
        ═══════════════════════════════ */
        #btnSubmit {
            width:100%; margin-top:6px; padding:14px;
            background:linear-gradient(135deg, #38bdf8 0%, #0ea5e9 60%, #0284c7 100%);
            border:none; border-radius:var(--r-lg);
            color:#001c30; font-family:'Kanit'; font-weight:700; font-size:.97rem;
            cursor:pointer; position:relative; overflow:hidden;
            transition:.3s var(--spring);
            box-shadow:0 6px 22px rgba(56,189,248,.35), inset 0 1px 0 rgba(255,255,255,.25);
        }
        #btnSubmit::after {
            content:''; position:absolute; inset:0;
            background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 55%);
            pointer-events:none;
        }
        #btnSubmit:hover  { transform:translateY(-3px); box-shadow:0 12px 30px rgba(56,189,248,.45); }
        #btnSubmit:active { transform:scale(.97) translateY(0); }
        #btnSubmit:disabled { opacity:.5; cursor:not-allowed; transform:none; }

        .btn-spinner {
            display:none; width:18px; height:18px;
            border:2.5px solid rgba(0,28,48,.25); border-top-color:#001c30;
            border-radius:50%; animation:spin .8s linear infinite; margin:0 auto;
        }
        @keyframes spin { to{transform:rotate(360deg)} }
        #btnSubmit.loading .btn-text   { display:none; }
        #btnSubmit.loading .btn-spinner{ display:block; }

        /* ═══════════════════════════════
           DIVIDER
        ═══════════════════════════════ */
        .divider {
            display:flex; align-items:center; gap:12px;
            margin:26px 0 18px;
        }
        .divider span {
            font-family:'Kanit'; font-size:.78rem; font-weight:600;
            color:rgba(255,255,255,.35); white-space:nowrap;
            display:flex; align-items:center; gap:6px;
        }
        .divider::before, .divider::after {
            content:''; flex:1; height:1px;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);
        }

        /* ═══════════════════════════════
           COMPLAINT LIST
        ═══════════════════════════════ */
        .c-item {
            background:var(--frost);
            backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
            border:1px solid var(--border-s);
            border-radius:var(--r-xl); padding:18px 18px 14px;
            margin-bottom:12px; position:relative; overflow:hidden;
            transition:.25s var(--ease);
            animation:fadeUp .5s var(--spring) both;
        }
        .c-item::before {
            content:''; position:absolute; top:0; left:8%; right:8%; height:1px;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);
        }
        .c-item:hover {
            border-color:rgba(255,255,255,.18);
            background:var(--frost-hover);
            transform:translateY(-2px);
            box-shadow:0 8px 28px rgba(0,0,0,.22);
        }

        /* badge */
        .badge {
            display:inline-flex; align-items:center; gap:5px;
            padding:3px 10px; border-radius:999px; border:1px solid;
            font-family:'Kanit'; font-weight:600; font-size:.68rem;
            margin-bottom:11px;
        }
        .badge .dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
        .b-wait    { color:var(--grey);    border-color:rgba(100,116,139,.4); background:rgba(100,116,139,.08); }
        .b-process { color:var(--warning); border-color:rgba(251,191,36,.4);  background:rgba(251,191,36,.08); }
        .b-success { color:var(--success); border-color:rgba(52,211,153,.4);  background:rgba(52,211,153,.08); }
        .b-fail    { color:var(--danger);  border-color:rgba(248,113,113,.4); background:rgba(248,113,113,.08); }

        .c-detail {
            font-size:.91rem; line-height:1.7; color:#e2e8f0;
            word-break:break-word; white-space:pre-wrap;
        }

        .ref-row {
            margin-top:11px;
            background:rgba(255,255,255,.04); border:1px solid var(--border-s);
            border-radius:var(--r-md); padding:8px 12px;
            display:flex; align-items:center; gap:8px; overflow:hidden;
        }
        .ref-row .ref-ico { color:var(--accent); font-size:.72rem; flex-shrink:0; }
        .ref-a {
            color:var(--accent); text-decoration:none; font-size:.78rem;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
        }
        .ref-a:hover { text-decoration:underline; }
        .ref-ext { color:var(--text-dimmer); font-size:.7rem; flex-shrink:0; }

        .admin-reply {
            margin-top:12px;
            background:rgba(56,189,248,.06); border-left:2px solid var(--accent);
            border-radius:var(--r-md); padding:11px 14px;
        }
        .ar-label {
            font-family:'Kanit'; font-weight:600; font-size:.75rem;
            color:var(--accent); margin-bottom:4px;
            display:flex; align-items:center; gap:5px;
        }
        .ar-text { font-size:.87rem; color:#cbd5e1; line-height:1.6; }

        .c-meta {
            margin-top:12px; padding-top:10px;
            border-top:1px solid rgba(255,255,255,.05);
            font-size:.68rem; color:var(--text-dimmer);
            display:flex; align-items:center; gap:5px;
        }

        /* empty state */
        .empty {
            text-align:center; padding:44px 20px;
            color:var(--text-dimmer); font-size:.86rem;
            animation:fadeUp .6s var(--spring) both;
        }
        .empty .e-icon { font-size:2.2rem; opacity:.25; margin-bottom:10px; }

        /* ═══════════════════════════════
           OVERLAY ALERT
        ═══════════════════════════════ */
        .overlay {
            position:fixed; inset:0; z-index:9999;
            background:rgba(2,8,23,0.75);
            backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
            display:none; align-items:center; justify-content:center; padding:20px;
        }
        .overlay.on { display:flex; }
        .a-box {
            background:rgba(255,255,255,0.07);
            backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
            border:1px solid var(--border);
            border-radius:var(--r-xl); padding:40px 30px 32px;
            text-align:center; width:100%; max-width:300px;
            transform:scale(.82) translateY(18px); opacity:0;
            transition:.45s var(--spring);
            box-shadow:0 32px 64px rgba(0,0,0,.55),
                       inset 0 1px 0 rgba(255,255,255,.14);
            position:relative; overflow:hidden;
        }
        .a-box::before {
            content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
            opacity:.2;
        }
        .overlay.on .a-box { transform:scale(1) translateY(0); opacity:1; }
        .a-icon  { font-size:3rem; margin-bottom:14px; display:block; }
        .a-title { font-family:'Kanit'; font-weight:700; font-size:1.15rem; margin-bottom:6px; }
        .a-desc  { font-size:.86rem; color:var(--text-dim); margin-bottom:24px; line-height:1.6; }
        .a-btn {
            background:linear-gradient(135deg,#38bdf8,#0ea5e9);
            border:none; border-radius:var(--r-lg); padding:11px 36px;
            color:#001c30; font-family:'Kanit'; font-weight:700; font-size:.9rem;
            cursor:pointer; transition:.25s var(--spring);
            box-shadow:0 4px 16px rgba(56,189,248,.3);
        }
        .a-btn:hover { transform:scale(1.05); }

        /* ═══════════════════════════════
           KEYFRAMES
        ═══════════════════════════════ */
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px) scale(.97); }
            to   { opacity:1; transform:translateY(0)    scale(1); }
        }
    </style>
</head>
<body>

<!-- JS ภายนอก -->
<script src="All/กำลังโหลด.js"></script>
<script src="All/ย้อนกลับ.js"></script>
<script src="All/พื้นหลัง.js"></script>

<!-- OVERLAY -->
<div id="ov" class="overlay" onclick="if(event.target===this)closeOv()">
    <div class="a-box" id="aBox">
        <span id="aIcon" class="a-icon"></span>
        <div id="aTitle" class="a-title"></div>
        <div id="aDesc"  class="a-desc"></div>
        <button class="a-btn" onclick="closeOv()">ตกลง</button>
    </div>
</div>

<!-- PAGE -->
<div class="page">

    <!-- HERO -->
    <div class="hero">
        <div class="hero-chip">
            <span class="pulse"></span>
            STELLAR COUNCIL
        </div>
        <h1>ศูนย์แจ้งปัญหา</h1>
        <p class="hero-sub">แจ้งปัญหา · เสนอความต้องการ · ติดตามสถานะ</p>
    </div>

    <!-- FORM CARD -->
    <div class="card" style="animation-delay:.05s">
        <div class="card-heading">
            <div class="ch-icon"><i class="fas fa-pen-nib"></i></div>
            แจ้งปัญหาใหม่
        </div>

        <div class="field">
            <div class="field-label"><i class="fas fa-align-left"></i> รายละเอียด</div>
            <textarea id="detail" maxlength="500" placeholder="อธิบายปัญหาหรือความต้องการอย่างละเอียด..."></textarea>
            <div class="char-row" id="charRow"><span id="charCount">0</span>&nbsp;/ 500</div>
        </div>

        <div class="field">
            <div class="field-label">
                <i class="fas fa-link"></i> ลิงก์อ้างอิง
                <span style="font-weight:400;color:var(--text-dimmer);margin-left:3px;">(ถ้ามี)</span>
            </div>
            <input type="url" id="refLink" placeholder="https://example.com">
        </div>

        <button id="btnSubmit">
            <span class="btn-text"><i class="fas fa-paper-plane" style="margin-right:8px"></i>ส่งข้อมูล</span>
            <span class="btn-spinner"></span>
        </button>
    </div>

    <!-- LIST -->
    <div class="divider">
        <span><i class="fas fa-clock-rotate-left"></i>รายการล่าสุด</span>
    </div>
    <div id="list"></div>

</div>

<script type="module">
/* ── Firebase (config inline) ── */
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

const app = initializeApp({
    apiKey:            "AIzaSyCsBzUXKm_421QMAj2UG8IZYDiFLgc8vfw",
    authDomain:        "student-council-nby-68.firebaseapp.com",
    projectId:         "student-council-nby-68",
    storageBucket:     "student-council-nby-68.firebasestorage.app",
    messagingSenderId: "198592356446",
    appId:             "1:198592356446:web:c8de1a525606b10e8254cf"
});
const db = getFirestore(app);

/* ── PurgoMalum — content filter ── */
async function filterContent(text, link = "") {
    /* ตรวจ format ลิงก์ก่อน (ไม่ต้องเรียก API) */
    if (link && !/^https?:\/\/.+/i.test(link))
        return { ok:false, msg:"ลิงก์ต้องขึ้นต้นด้วย https:// หรือ http://" };

    try {
        const combined = text + (link ? " " + link : "");
        const res = await fetch(
            "https://www.purgomalum.com/service/containsprofanity?text=" +
            encodeURIComponent(combined)
        );
        const flagged = (await res.text()).trim() === "true";
        if (flagged) return { ok:false, msg:"กรุณาใช้ถ้อยคำที่สุภาพครับ 🙏" };
    } catch(e) {
        console.warn("PurgoMalum error:", e);
        /* fail-open — ถ้า API ล่มให้ผ่านไปก่อน */
    }

    return { ok:true };
}

/* ── Char counter ── */
const detailEl = document.getElementById('detail');
const charEl   = document.getElementById('charCount');
const charRow  = document.getElementById('charRow');
detailEl.addEventListener('input', () => {
    const n = detailEl.value.length;
    charEl.textContent = n;
    charRow.classList.toggle('warn', n > 420);
});

/* ── Alert helpers ── */
window.closeOv = () => {
    const ov = document.getElementById('ov');
    ov.classList.remove('on');
    setTimeout(() => { ov.style.display='none'; }, 400);
};
const showAlert = (type, title, desc) => {
    const icons = { success:'✅', danger:'❌', warning:'⚠️' };
    document.getElementById('aIcon').textContent  = icons[type]||'ℹ️';
    document.getElementById('aTitle').textContent = title;
    document.getElementById('aTitle').style.color = type==='success' ? 'var(--accent)' : 'var(--danger)';
    document.getElementById('aDesc').textContent  = desc;
    const ov = document.getElementById('ov');
    ov.style.display = 'flex';
    requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('on')));
};

/* ── Submit ── */
const btn = document.getElementById('btnSubmit');
btn.addEventListener('click', async () => {
    const detail  = detailEl.value.trim();
    const refLink = document.getElementById('refLink').value.trim();
    if (!detail) { detailEl.focus(); return; }

    btn.disabled = true; btn.classList.add('loading');

    const check = await filterContent(detail, refLink);
    if (!check.ok) {
        btn.disabled = false; btn.classList.remove('loading');
        showAlert('warning','ตรวจพบเนื้อหาไม่เหมาะสม', check.msg);
        return;
    }

    try {
        await addDoc(collection(db,'complaints'), {
            detail, refLink,
            status:'ยังไม่ได้แก้ไข',
            adminReply:'',
            timestamp: serverTimestamp()
        });
        detailEl.value='';
        document.getElementById('refLink').value='';
        charEl.textContent='0';
        showAlert('success','ส่งเรื่องสำเร็จ!','ทีมสภานักเรียนจะดำเนินการโดยเร็ว');
    } catch(e) {
        console.error(e);
        showAlert('danger','เกิดข้อผิดพลาด','ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่');
    } finally {
        btn.disabled = false; btn.classList.remove('loading');
    }
});

/* ── Status map ── */
const ST = {
    'ยังไม่ได้แก้ไข':    { cls:'b-wait',    label:'รอดำเนินการ' },
    'กำลังดำเนินการ':     { cls:'b-process',  label:'กำลังดำเนินการ' },
    'แก้ไขแล้ว':          { cls:'b-success',  label:'แก้ไขแล้ว' },
    'ไม่สามารถแก้ไขได้':  { cls:'b-fail',     label:'ดำเนินการไม่ได้' },
};

/* ── Real-time list ── */
const listEl = document.getElementById('list');
onSnapshot(query(collection(db,'complaints'), orderBy('timestamp','desc')), snap => {
    listEl.innerHTML = '';
    if (snap.empty) {
        listEl.innerHTML = `<div class="empty"><div class="e-icon"><i class="fas fa-inbox"></i></div>ยังไม่มีรายการแจ้งปัญหา</div>`;
        return;
    }
    snap.forEach((doc, i) => {
        const d  = doc.data();
        const st = ST[d.status] || ST['ยังไม่ได้แก้ไข'];
        const ts = d.timestamp
            ? d.timestamp.toDate().toLocaleString('th-TH',{dateStyle:'long',timeStyle:'short'})
            : 'กำลังส่ง...';

        const refHtml = d.refLink ? `
            <div class="ref-row">
                <i class="fas fa-link ref-ico"></i>
                <a href="${d.refLink}" target="_blank" rel="noopener" class="ref-a">${d.refLink}</a>
                <a href="${d.refLink}" target="_blank" rel="noopener" class="ref-ext">
                    <i class="fas fa-arrow-up-right-from-square"></i>
                </a>
            </div>` : '';

        const replyHtml = d.adminReply ? `
            <div class="admin-reply">
                <div class="ar-label"><i class="fas fa-reply"></i> สภานักเรียน</div>
                <div class="ar-text">${d.adminReply}</div>
            </div>` : '';

        const el = document.createElement('div');
        el.className = 'c-item';
        el.style.animationDelay = `${i * 0.055}s`;
        el.innerHTML = `
            <div><span class="badge ${st.cls}"><span class="dot"></span>${st.label}</span></div>
            <div class="c-detail">${d.detail}</div>
            ${refHtml}${replyHtml}
            <div class="c-meta"><i class="far fa-clock"></i>${ts}</div>`;
        listEl.appendChild(el);
    });
});
</script>
</body>
</html>
